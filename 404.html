<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | Dr. Madhukar H. Dalvi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:        #1a1208;
      --paper:      #f5f0e8;
      --gold:       #b8860b;
      --gold-light: #d4a017;
      --border:     #c9bfa8;
      --muted:      #6b5f4e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Serif 4', Georgia, serif;
      background: #1a3a2a;
      color: var(--paper);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .four-oh-four {
      font-family: 'Playfair Display', serif;
      font-size: clamp(5rem, 15vw, 10rem);
      color: var(--gold-light);
      line-height: 1;
      opacity: 0.4;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      margin-bottom: 16px;
      font-style: italic;
    }
    p {
      color: var(--border);
      font-size: 1rem;
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    a {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid rgba(184,134,11,0.5);
      color: var(--gold-light);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s;
    }
    a:hover { background: rgba(184,134,11,0.1); border-color: var(--gold-light); }
  </style>
</head>
<body>
  <div class="four-oh-four">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or may have been moved.</p>
  <a href="/">Return to Homepage</a>
</body>
</html>
